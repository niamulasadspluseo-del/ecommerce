services:
  # ---- Backend: Laravel API ----
  - type: web
    name: ecommerce-api
    runtime: php
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: bash render-start.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: array
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ecommerce-frontend
          property: host
      - key: LOG_CHANNEL
        value: stderr

  # ---- Frontend: TanStack Start (Node SSR) ----
  - type: web
    name: ecommerce-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        fromService:
          type: web
          name: ecommerce-api
          property: host
