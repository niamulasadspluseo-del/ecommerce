services:
  # ---- Backend: Laravel API (Docker) ----
  - type: web
    name: ecommerce-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: array
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: FRONTEND_URL
        value: https://ecommerce-frontend.onrender.com
      - key: APP_KEY
        generateValue: true

  # ---- Frontend: TanStack Start (Node SSR) ----
  - type: web
    name: ecommerce-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        value: https://ecommerce-api.onrender.com
